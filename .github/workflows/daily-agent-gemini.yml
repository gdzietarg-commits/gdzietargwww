# Codzienny agent AI w wariancie Gemini (darmowy klucz: aistudio.google.com/apikey).
# Wymaga sekretu GEMINI_API_KEY. Działa w harmonogramie tylko, gdy NIE ma klucza
# ANTHROPIC_API_KEY (żeby dwa agenty nie edytowały danych naraz); ręcznie
# (Run workflow) można go uruchomić zawsze.
# Bezpieczniki: agent nie commituje sam — workflow waliduje build i przyjmuje
# wyłącznie zmiany w data/markets.json.

name: Daily Agent — Gemini (aktualizacja danych)

on:
  schedule:
    - cron: "15 4 * * *" # codziennie 04:15 UTC (~06:15 w Polsce)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      HAS_GEMINI: ${{ secrets.GEMINI_API_KEY != '' }}
      HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Sprawdź warunki uruchomienia
        run: |
          if [ "$HAS_GEMINI" != "true" ]; then
            echo "Brak sekretu GEMINI_API_KEY — pomijam."
          elif [ "$HAS_ANTHROPIC" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Jest klucz Anthropic — w harmonogramie działa agent Claude, pomijam Gemini."
          fi

      - uses: actions/checkout@v4
        if: env.HAS_GEMINI == 'true' && (env.HAS_ANTHROPIC != 'true' || github.event_name == 'workflow_dispatch')
        with:
          ref: main

      - uses: actions/setup-node@v4
        if: env.HAS_GEMINI == 'true' && (env.HAS_ANTHROPIC != 'true' || github.event_name == 'workflow_dispatch')
        with:
          node-version: 22

      - name: Uruchom agenta Gemini
        if: env.HAS_GEMINI == 'true' && (env.HAS_ANTHROPIC != 'true' || github.event_name == 'workflow_dispatch')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g @google/gemini-cli
          gemini --yolo -m gemini-3.5-flash -p "Przeczytaj plik prompts/daily-update.md i wykonaj opisane tam zadanie. WAŻNE ODSTĘPSTWO: nie wykonuj kroku commit/push — commit zrobi za Ciebie workflow. Twoja praca kończy się na edycji data/markets.json i obsłudze issues (gh issue). Dziś jest $(date -u +%F)." || echo "Agent zakończył z błędem — sprawdzam, czy zostawił sensowne zmiany."

      - name: Walidacja i commit (tylko data/markets.json)
        if: env.HAS_GEMINI == 'true' && (env.HAS_ANTHROPIC != 'true' || github.event_name == 'workflow_dispatch')
        run: |
          # odrzuć wszystkie zmiany poza bazą targowisk
          git add data/markets.json
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          # walidacja: JSON poprawny i strona się buduje
          node build.mjs
          git config user.name "gdzietarg-gemini"
          git config user.email "actions@github.com"
          git diff --cached --quiet || git commit -m "data: aktualizacja targowisk $(date -u +%F) (agent Gemini)"
          git push
