# Build + deploy na dwa cele:
#  1. FTP → hosting z domeną www.gdzietarg.pl (główny adres) — wymaga sekretów
#     FTP_SERVER, FTP_USERNAME, FTP_PASSWORD (Settings → Secrets → Actions).
#     Opcjonalnie zmienna repozytorium FTP_SERVER_DIR (Settings → Variables),
#     jeśli pliki domeny leżą w podkatalogu (np. "public_html/").
#  2. GitHub Pages (adres zapasowy/podgląd).

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nie przerywamy deployu w połowie: nowy push CZEKA, zamiast anulować trwający upload FTP
# (ochrona przed częściowym stanem na serwerze — T6).
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Waliduj dane (schemat + anty-XSS)
        run: node scripts/validate-markets.mjs
      - name: Zbuduj stronę
        run: node build.mjs
      - name: Bramka integralności buildu (przed wysyłką)
        run: node scripts/check-build.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
      - uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-ftp:
    needs: build
    runs-on: ubuntu-latest
    env:
      HAS_FTP: ${{ secrets.FTP_PASSWORD != '' }}
    steps:
      - name: Brak sekretów FTP — pomiń
        if: env.HAS_FTP != 'true'
        run: echo "Dodaj sekrety FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, aby wgrywać na www.gdzietarg.pl."
      # checkout daje skrypty (verify-deploy) i data/config.json do smoke-testu
      - uses: actions/checkout@v4
        if: env.HAS_FTP == 'true'
      - uses: actions/setup-node@v4
        if: env.HAS_FTP == 'true'
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        if: env.HAS_FTP == 'true'
        with:
          name: site
          path: dist
      # FTP bywa przejściowo niedostępny (home.pl potrafi odrzucić: „530 connection couldn't
      # be accepted"). 3 próby z backoffem — bez anulowania (concurrency: cancel-in-progress:false).
      - name: Wgraj przez FTP (próba 1)
        id: ftp1
        if: env.HAS_FTP == 'true'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
      - name: Backoff przed próbą 2
        if: env.HAS_FTP == 'true' && steps.ftp1.outcome == 'failure'
        run: sleep 30
      - name: Wgraj przez FTP (próba 2)
        id: ftp2
        if: env.HAS_FTP == 'true' && steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
      - name: Backoff przed próbą 3
        if: env.HAS_FTP == 'true' && steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 60
      - name: Wgraj przez FTP (próba 3)
        id: ftp3
        if: env.HAS_FTP == 'true' && steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          local-dir: dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
      - name: Zgłoś porażkę, jeśli wszystkie próby FTP padły
        if: env.HAS_FTP == 'true' && steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure' && steps.ftp3.outcome == 'failure'
        run: |
          echo "::error::Wszystkie 3 próby FTP nieudane — prawdopodobnie awaria/limit home.pl. Strona bez zmian; deploy ponowi się przy kolejnym pushu."
          exit 1
      - name: Smoke-test po deployu (żywa strona + świeżość)
        if: env.HAS_FTP == 'true'
        env:
          EXPECT_SHA: ${{ github.sha }}
        run: node scripts/verify-deploy.mjs
      - name: Powiadom wyszukiwarki (IndexNow)
        if: env.HAS_FTP == 'true'
        continue-on-error: true
        run: node scripts/indexnow.mjs

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
